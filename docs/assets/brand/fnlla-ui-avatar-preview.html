<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#16325B">
  <title>FNLLA UI avatar preview</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 512px;
      height: 512px;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(47, 101, 235, 0.28), transparent 34%),
        radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.24), transparent 38%),
        linear-gradient(145deg, #f7faff 0%, #edf3fb 55%, #e6f4f1 100%);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .frame {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      border-radius: 132px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.82);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.76), rgba(255, 255, 255, 0.62)),
        linear-gradient(135deg, rgba(47, 101, 235, 0.15), rgba(15, 118, 110, 0.12));
      box-shadow: 0 28px 56px rgba(15, 33, 64, 0.18);
    }

    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      border-radius: 999px;
    }

    .frame::before {
      inset: 32px;
      border: 1px solid rgba(22, 50, 91, 0.08);
    }

    .frame::after {
      width: 188px;
      height: 188px;
      right: -52px;
      bottom: -52px;
      background: rgba(15, 118, 110, 0.14);
      filter: blur(6px);
    }

    .mark-wrap {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 16px;
      justify-items: center;
    }

    .mark {
      width: 220px;
      height: 220px;
      border-radius: 56px;
      box-shadow: 0 28px 48px rgba(22, 50, 91, 0.16);
    }

    .label {
      margin: 0;
      color: #16325b;
      font-size: 44px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }
  </style>
</head>
<body>
  <main class="frame" aria-label="FNLLA UI GitHub avatar preview">
    <div class="mark-wrap">
      <img class="mark" src="./fnlla-ui-mark.svg" alt="">
      <p class="label">FNLLA UI</p>
    </div>
  </main>
</body>
</html>
