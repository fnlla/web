<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#11181F">
  <title>FNLLA UI avatar preview</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 512px;
      height: 512px;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 36%),
        linear-gradient(145deg, #fbfcfe 0%, #f3f6fb 100%);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .frame {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      border-radius: 132px;
      border: 1px solid rgba(255, 255, 255, 0.86);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.74));
      box-shadow: 0 28px 56px rgba(17, 24, 31, 0.12);
    }

    .mark-wrap {
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .mark {
      width: 228px;
      height: auto;
    }

    .label {
      margin: 0;
      color: #11181f;
      font-size: 44px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }
  </style>
</head>
<body>
  <main class="frame" aria-label="FNLLA UI GitHub avatar preview">
    <div class="mark-wrap">
      <img class="mark" src="./fnlla-ui.svg" alt="">
      <p class="label">FNLLA UI</p>
    </div>
  </main>
</body>
</html>
