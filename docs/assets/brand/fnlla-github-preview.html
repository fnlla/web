<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#11181F">
  <title>FNLLA GitHub organization avatar preview</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 512px;
      height: 512px;
      margin: 0;
      overflow: hidden;
      background: #f4f7fb;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 36px;
    }

    .frame {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      border-radius: 132px;
      border: 1px solid rgba(17, 24, 31, 0.08);
      background: #ffffff;
    }

    .mark {
      width: 252px;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <main class="frame" aria-label="FNLLA GitHub organization avatar preview">
    <img class="mark" src="./fnlla-github.svg" alt="">
  </main>
</body>
</html>
