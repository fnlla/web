<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#11181F">
  <title>FNLLA GitHub organization avatar preview</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 512px;
      height: 512px;
      margin: 0;
      overflow: hidden;
      background: #ffffff;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 0;
    }

    .mark {
      width: 236px;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <img class="mark" src="./fnlla-github.svg" alt="" aria-label="FNLLA GitHub organization avatar preview">
</body>
</html>
