name: FNLLA Web Hardening

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hardening:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Publish runtime and generated docs
        shell: pwsh
        run: node .\scripts\publish-fnlla-web.mjs

      - name: Run browser smoke coverage
        shell: pwsh
        run: node .\scripts\test-fnlla-web-browser.mjs

      - name: Validate release contract
        shell: pwsh
        run: node .\scripts\validate-fnlla-web.mjs

  organization-branding:
    runs-on: windows-latest

    steps:
      - name: Clone FNLLA organization defaults
        shell: pwsh
        run: git clone --depth 1 https://github.com/fnlla/.github.git "$env:RUNNER_TEMP\\fnlla-org-github"

      - name: Check organization branding drift
        shell: pwsh
        run: |
          $repo = Join-Path $env:RUNNER_TEMP 'fnlla-org-github'
          $targets = @(
            'README.md',
            'CONTRIBUTING.md',
            'CODE_OF_CONDUCT.md',
            'profile\README.md',
            '.github\ISSUE_TEMPLATE\bug-report.yml',
            '.github\ISSUE_TEMPLATE\feature-request.yml'
          )
          $legacyPattern = 'FNLLA UI|fnlla/ui|fnlla-ui'
          $failures = New-Object System.Collections.Generic.List[string]
          foreach ($target in $targets) {
            $path = Join-Path $repo $target
            $matches = Select-String -Path $path -Pattern $legacyPattern
            foreach ($match in $matches) {
              $failures.Add(('{0}:{1}' -f $target, $match.LineNumber)) | Out-Null
            }
          }
          if ($failures.Count -gt 0) {
            Write-Host 'FNLLA organization defaults still contain legacy FNLLA UI naming.'
            foreach ($failure in $failures) {
              Write-Host ('- ' + $failure)
            }
            exit 1
          }
          Write-Host 'FNLLA organization defaults use current FNLLA Web naming.'

  firefox-smoke:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install Mozilla Firefox
        shell: pwsh
        run: choco install firefox --no-progress

      - name: Publish runtime and generated docs
        shell: pwsh
        run: node .\scripts\publish-fnlla-web.mjs

      - name: Run Firefox smoke coverage
        shell: pwsh
        run: |
          $firefox = if (Test-Path 'C:\Program Files\Mozilla Firefox\firefox.exe') {
            'C:\Program Files\Mozilla Firefox\firefox.exe'
          } elseif (Test-Path 'C:\Program Files (x86)\Mozilla Firefox\firefox.exe') {
            'C:\Program Files (x86)\Mozilla Firefox\firefox.exe'
          } else {
            throw 'Firefox executable not found after installation.'
          }
          node .\scripts\test-fnlla-web-browser.mjs --browser $firefox --browser-family firefox
